<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>App Django com Django Templates Language e o Bootstrap</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<!-- min-vh-100 faz a página ocupar toda altura da tela -->
<body class="bg-dark text-light d-flex flex-column min-vh-100">

    <!-- Conteúdo principal da página -->
    <main class="flex-fill">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-black text-center text-light py-3 border-top border-secondary">
        <div class="container">
            <p class="mb-1">
                © 2026 - Todos os direitos reservados ao Aluno Tiago Alves de Souza.
            </p>
            <small class="text-secondary">
                App Desenvolvido com Django Templates Language (DTL) e o Bootstrap
            </small>
        </div>
    </footer>

</body>
</html>
